<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TIFP Mill Lists - Authentication</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --bg: #0f1117;
            --bg-card: #1a1d27;
            --border: #2a2e3a;
            --text: #e4e6ed;
            --text-dim: #8b8fa3;
            --text-bright: #ffffff;
            --accent: #4f7df9;
            --green: #34d399;
            --red: #f87171;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', 'Oxygen',
                'Ubuntu', 'Cantarell', 'Fira Sans', 'Droid Sans', 'Helvetica Neue',
                sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .container {
            width: 100%;
            max-width: 420px;
        }

        .card {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 40px 32px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
        }

        .logo-section {
            text-align: center;
            margin-bottom: 32px;
        }

        .logo {
            font-size: 32px;
            font-weight: 700;
            color: var(--accent);
            margin-bottom: 8px;
            letter-spacing: -0.5px;
        }

        .logo-subtitle {
            font-size: 13px;
            color: var(--text-dim);
            font-weight: 500;
            letter-spacing: 1px;
            text-transform: uppercase;
        }

        .tabs {
            display: flex;
            gap: 12px;
            margin-bottom: 28px;
            border-bottom: 1px solid var(--border);
        }

        .tab-button {
            flex: 1;
            padding: 12px 16px;
            background: none;
            border: none;
            color: var(--text-dim);
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            border-bottom: 2px solid transparent;
            margin-bottom: -1px;
            transition: all 0.2s ease;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .tab-button:hover {
            color: var(--text);
        }

        .tab-button.active {
            color: var(--accent);
            border-bottom-color: var(--accent);
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            font-size: 13px;
            font-weight: 600;
            color: var(--text);
            margin-bottom: 8px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        input[type="text"],
        input[type="email"],
        input[type="password"] {
            width: 100%;
            padding: 12px 14px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--border);
            border-radius: 8px;
            color: var(--text-bright);
            font-size: 14px;
            transition: all 0.2s ease;
            font-family: inherit;
        }

        input[type="text"]::placeholder,
        input[type="email"]::placeholder,
        input[type="password"]::placeholder {
            color: var(--text-dim);
        }

        input[type="text"]:focus,
        input[type="email"]:focus,
        input[type="password"]:focus {
            outline: none;
            border-color: var(--accent);
            background: rgba(79, 125, 249, 0.08);
            box-shadow: 0 0 0 3px rgba(79, 125, 249, 0.1);
        }

        .password-container {
            position: relative;
        }

        .toggle-password {
            position: absolute;
            right: 12px;
            top: 50%;
            transform: translateY(-50%);
            background: none;
            border: none;
            color: var(--text-dim);
            cursor: pointer;
            padding: 4px 8px;
            font-size: 14px;
            font-weight: 600;
            transition: color 0.2s ease;
        }

        .toggle-password:hover {
            color: var(--text);
        }

        input[type="password"] ~ .toggle-password {
            top: 42%;
        }

        .password-requirements {
            margin-top: 12px;
            padding: 12px;
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid var(--border);
            border-radius: 8px;
            font-size: 13px;
        }

        .requirement {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 4px 0;
            color: var(--text-dim);
            transition: color 0.2s ease;
        }

        .requirement.met {
            color: var(--green);
        }

        .requirement-icon {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 16px;
            height: 16px;
            font-weight: 700;
            font-size: 12px;
        }

        .requirement:not(.met) .requirement-icon::before {
            content: '○';
        }

        .requirement.met .requirement-icon::before {
            content: '✓';
        }

        button[type="submit"] {
            width: 100%;
            padding: 12px 16px;
            background: var(--accent);
            border: none;
            border-radius: 8px;
            color: var(--text-bright);
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s ease;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        button[type="submit"]:hover {
            background: #3d67e8;
            transform: translateY(-1px);
            box-shadow: 0 8px 20px rgba(79, 125, 249, 0.3);
        }

        button[type="submit"]:active {
            transform: translateY(0);
        }

        button[type="submit"]:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }

        .message {
            padding: 12px;
            border-radius: 8px;
            font-size: 13px;
            margin-bottom: 20px;
            display: none;
        }

        .message.show {
            display: block;
        }

        .message.error {
            background: rgba(248, 113, 113, 0.1);
            border: 1px solid rgba(248, 113, 113, 0.3);
            color: #ff9999;
        }

        .message.success {
            background: rgba(52, 211, 153, 0.1);
            border: 1px solid rgba(52, 211, 153, 0.3);
            color: var(--green);
        }

        .divider {
            text-align: center;
            margin: 24px 0;
            font-size: 13px;
            color: var(--text-dim);
        }

        .link-button {
            background: none;
            border: none;
            color: var(--accent);
            font-size: 13px;
            cursor: pointer;
            text-decoration: none;
            font-weight: 600;
            padding: 0;
            transition: color 0.2s ease;
        }

        .link-button:hover {
            color: #6b8dff;
        }

        .switch-form {
            text-align: center;
            margin-top: 20px;
            font-size: 13px;
            color: var(--text-dim);
        }

        .switch-form button {
            margin-left: 4px;
        }

        .code-block {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 16px;
            margin: 20px 0;
            font-family: 'Courier New', monospace;
            font-size: 12px;
            word-break: break-all;
            color: var(--accent);
            display: none;
        }

        .code-block.show {
            display: block;
        }

        .reset-instructions {
            display: none;
            font-size: 13px;
            color: var(--text-dim);
            margin-bottom: 20px;
        }

        .reset-instructions.show {
            display: block;
        }

        .view {
            display: none;
        }

        .view.active {
            display: block;
        }

        .loading {
            position: relative;
        }

        .loading::after {
            content: '';
            position: absolute;
            right: 12px;
            top: 50%;
            transform: translateY(-50%);
            width: 16px;
            height: 16px;
            border: 2px solid rgba(255, 255, 255, 0.2);
            border-top-color: var(--text-bright);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin {
            to {
                transform: translateY(-50%) rotate(360deg);
            }
        }

        @media (max-width: 480px) {
            .card {
                padding: 32px 20px;
            }

            .logo {
                font-size: 28px;
            }

            .tabs {
                gap: 8px;
            }

            .tab-button {
                padding: 10px 12px;
                font-size: 12px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="card">
            <div class="logo-section">
                <div class="logo">TIFP</div>
                <div class="logo-subtitle">Mill Lists</div>
            </div>

            <div class="tabs">
                <button class="tab-button active" data-tab="login">Log In</button>
                <button class="tab-button" data-tab="signup">Sign Up</button>
            </div>

            <!-- Login View -->
            <div id="login" class="view active">
                <form id="loginForm">
                    <div id="loginMessage" class="message"></div>

                    <div class="form-group">
                        <label for="loginEmail">Email</label>
                        <input
                            type="email"
                            id="loginEmail"
                            name="email"
                            placeholder="you@example.com"
                            required
                            autocomplete="email"
                        >
                    </div>

                    <div class="form-group">
                        <label for="loginPassword">Password</label>
                        <div class="password-container">
                            <input
                                type="password"
                                id="loginPassword"
                                name="password"
                                placeholder="Enter your password"
                                required
                                autocomplete="current-password"
                            >
                            <button
                                type="button"
                                class="toggle-password"
                                data-target="loginPassword"
                            >show</button>
                        </div>
                    </div>

                    <button type="submit" class="tab-button" style="width: 100%; border: none; margin-bottom: 20px; padding: 12px 16px;">Log In</button>

                    <div style="text-align: center; margin-bottom: 20px;">
                        <button type="button" class="link-button" id="forgotPasswordBtn">
                            Forgot Password?
                        </button>
                    </div>

                    <div class="switch-form">
                        Don't have an account?
                        <button type="button" class="link-button" data-switch-tab="signup">
                            Sign Up
                        </button>
                    </div>
                </form>
            </div>

            <!-- Sign Up View -->
            <div id="signup" class="view">
                <form id="signupForm">
                    <div id="signupMessage" class="message"></div>

                    <div class="form-group">
                        <label for="displayName">Display Name</label>
                        <input
                            type="text"
                            id="displayName"
                            name="display_name"
                            placeholder="Your name"
                            required
                            autocomplete="name"
                        >
                    </div>

                    <div class="form-group">
                        <label for="signupEmail">Email</label>
                        <input
                            type="email"
                            id="signupEmail"
                            name="email"
                            placeholder="you@example.com"
                            required
                            autocomplete="email"
                        >
                    </div>

                    <div class="form-group">
                        <label for="signupPassword">Password</label>
                        <div class="password-container">
                            <input
                                type="password"
                                id="signupPassword"
                                name="password"
                                placeholder="Create a strong password"
                                required
                                autocomplete="new-password"
                            >
                            <button
                                type="button"
                                class="toggle-password"
                                data-target="signupPassword"
                            >show</button>
                        </div>
                        <div class="password-requirements">
                            <div class="requirement" data-requirement="length">
                                <div class="requirement-icon"></div>
                                <span>At least 10 characters</span>
                            </div>
                            <div class="requirement" data-requirement="special">
                                <div class="requirement-icon"></div>
                                <span>One special character (!@#$%^&*)</span>
                            </div>
                            <div class="requirement" data-requirement="number">
                                <div class="requirement-icon"></div>
                                <span>One number</span>
                            </div>
                        </div>
                    </div>

                    <div class="form-group">
                        <label for="confirmPassword">Confirm Password</label>
                        <div class="password-container">
                            <input
                                type="password"
                                id="confirmPassword"
                                name="confirm_password"
                                placeholder="Re-enter your password"
                                required
                                autocomplete="new-password"
                            >
                            <button
                                type="button"
                                class="toggle-password"
                                data-target="confirmPassword"
                            >show</button>
                        </div>
                    </div>

                    <button type="submit">Create Account</button>

                    <div class="switch-form">
                        Already have an account?
                        <button type="button" class="link-button" data-switch-tab="login">
                            Log In
                        </button>
                    </div>
                </form>
            </div>

            <!-- Forgot Password View -->
            <div id="forgot-password" class="view">
                <button
                    type="button"
                    class="link-button"
                    id="backToLoginBtn"
                    style="margin-bottom: 20px; display: flex; align-items: center; gap: 4px;"
                >
                    ← Back to Log In
                </button>

                <div id="forgotForm">
                    <div id="forgotMessage" class="message"></div>

                    <div class="form-group">
                        <label for="forgotEmail">Email</label>
                        <input
                            type="email"
                            id="forgotEmail"
                            name="email"
                            placeholder="you@example.com"
                            required
                            autocomplete="email"
                        >
                    </div>

                    <button type="submit" form="forgotPasswordForm" style="display: none;"></button>
                    <button type="button" id="sendResetBtn">Send Reset Link</button>

                    <div class="reset-instructions">
                        We'll send you a reset token. Copy it and use it below to reset your password.
                    </div>

                    <div id="resetTokenBlock" class="code-block"></div>
                </div>

                <div id="resetForm" style="display: none;">
                    <div id="resetMessage" class="message"></div>

                    <div class="form-group">
                        <label for="resetToken">Reset Token</label>
                        <input
                            type="text"
                            id="resetToken"
                            name="token"
                            placeholder="Paste your reset token"
                            required
                        >
                    </div>

                    <div class="form-group">
                        <label for="resetPassword">New Password</label>
                        <div class="password-container">
                            <input
                                type="password"
                                id="resetPassword"
                                name="password"
                                placeholder="Enter new password"
                                required
                            >
                            <button
                                type="button"
                                class="toggle-password"
                                data-target="resetPassword"
                            >show</button>
                        </div>
                    </div>

                    <div class="form-group">
                        <label for="resetConfirmPassword">Confirm Password</label>
                        <div class="password-container">
                            <input
                                type="password"
                                id="resetConfirmPassword"
                                name="confirm_password"
                                placeholder="Re-enter new password"
                                required
                            >
                            <button
                                type="button"
                                class="toggle-password"
                                data-target="resetConfirmPassword"
                            >show</button>
                        </div>
                    </div>

                    <button type="button" id="confirmResetBtn">Reset Password</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        const state = {
            currentView: 'login',
            resetToken: null
        };

        // Tab switching
        document.querySelectorAll('.tab-button').forEach(btn => {
            btn.addEventListener('click', (e) => {
                if (btn.hasAttribute('data-tab')) {
                    switchView(btn.dataset.tab);
                }
            });
        });

        // Tab switching via data-switch-tab
        document.querySelectorAll('[data-switch-tab]').forEach(btn => {
            btn.addEventListener('click', (e) => {
                e.preventDefault();
                switchView(btn.dataset.switchTab);
            });
        });

        // Forgot password navigation
        document.getElementById('forgotPasswordBtn').addEventListener('click', (e) => {
            e.preventDefault();
            switchView('forgot-password');
        });

        document.getElementById('backToLoginBtn').addEventListener('click', (e) => {
            e.preventDefault();
            resetForgotPasswordView();
            switchView('login');
        });

        function switchView(viewName) {
            document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
            document.querySelectorAll('.tab-button').forEach(b => b.classList.remove('active'));

            const view = document.getElementById(viewName);
            if (view) {
                view.classList.add('active');
                state.currentView = viewName;
            }

            if (viewName === 'login' || viewName === 'signup') {
                document.querySelector(`[data-tab="${viewName}"]`).classList.add('active');
            }
        }

        // Password visibility toggle
        document.querySelectorAll('.toggle-password').forEach(btn => {
            btn.addEventListener('click', (e) => {
                e.preventDefault();
                const targetId = btn.dataset.target;
                const input = document.getElementById(targetId);
                const isPassword = input.type === 'password';
                input.type = isPassword ? 'text' : 'password';
                btn.textContent = isPassword ? 'hide' : 'show';
            });
        });

        // Password requirements validation
        const passwordInput = document.getElementById('signupPassword');
        const confirmPasswordInput = document.getElementById('confirmPassword');

        function validatePasswordRequirements(password) {
            const requirements = {
                length: password.length >= 10,
                special: /[!@#$%^&*()_+\-=\[\]{};':"\\|,.<>\/?]/.test(password),
                number: /\d/.test(password)
            };
            return requirements;
        }

        function updateRequirementUI() {
            const password = passwordInput.value;
            const requirements = validatePasswordRequirements(password);

            document.querySelectorAll('.requirement').forEach(req => {
                const type = req.dataset.requirement;
                if (requirements[type]) {
                    req.classList.add('met');
                } else {
                    req.classList.remove('met');
                }
            });
        }

        passwordInput.addEventListener('input', updateRequirementUI);

        // Form submissions
        document.getElementById('loginForm').addEventListener('submit', handleLogin);
        document.getElementById('signupForm').addEventListener('submit', handleSignup);
        document.getElementById('sendResetBtn').addEventListener('click', handleForgotPassword);
        document.getElementById('confirmResetBtn').addEventListener('click', handleResetPassword);

        async function handleLogin(e) {
            e.preventDefault();
            const email = document.getElementById('loginEmail').value;
            const password = document.getElementById('loginPassword').value;
            const messageEl = document.getElementById('loginMessage');
            const submitBtn = e.target.querySelector('button[type="submit"]');

            messageEl.classList.remove('show', 'error', 'success');
            submitBtn.disabled = true;
            submitBtn.classList.add('loading');

            try {
                const response = await fetch('/api/auth/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, password })
                });

                const data = await response.json();

                if (response.ok) {
                    messageEl.textContent = 'Login successful! Redirecting...';
                    messageEl.classList.add('show', 'success');
                    setTimeout(() => {
                        window.location.href = '/app';
                    }, 1000);
                } else {
                    throw new Error(data.message || 'Login failed');
                }
            } catch (error) {
                messageEl.textContent = error.message;
                messageEl.classList.add('show', 'error');
            } finally {
                submitBtn.disabled = false;
                submitBtn.classList.remove('loading');
            }
        }

        async function handleSignup(e) {
            e.preventDefault();
            const displayName = document.getElementById('displayName').value;
            const email = document.getElementById('signupEmail').value;
            const password = document.getElementById('signupPassword').value;
            const confirmPassword = document.getElementById('confirmPassword').value;
            const messageEl = document.getElementById('signupMessage');
            const submitBtn = e.target.querySelector('button[type="submit"]');

            // Client-side validation
            if (password !== confirmPassword) {
                messageEl.textContent = 'Passwords do not match';
                messageEl.classList.add('show', 'error');
                return;
            }

            const requirements = validatePasswordRequirements(password);
            if (!requirements.length || !requirements.special || !requirements.number) {
                messageEl.textContent = 'Password does not meet requirements';
                messageEl.classList.add('show', 'error');
                return;
            }

            messageEl.classList.remove('show', 'error', 'success');
            submitBtn.disabled = true;
            submitBtn.classList.add('loading');

            try {
                const response = await fetch('/api/auth/register', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, password, display_name: displayName })
                });

                const data = await response.json();

                if (response.ok) {
                    messageEl.textContent = 'Account created successfully! Switching to login...';
                    messageEl.classList.add('show', 'success');
                    setTimeout(() => {
                        document.getElementById('signupForm').reset();
                        updateRequirementUI();
                        switchView('login');
                    }, 1500);
                } else {
                    throw new Error(data.message || 'Registration failed');
                }
            } catch (error) {
                messageEl.textContent = error.message;
                messageEl.classList.add('show', 'error');
            } finally {
                submitBtn.disabled = false;
                submitBtn.classList.remove('loading');
            }
        }

        async function handleForgotPassword() {
            const email = document.getElementById('forgotEmail').value;
            const messageEl = document.getElementById('forgotMessage');
            const btn = document.getElementById('sendResetBtn');

            messageEl.classList.remove('show', 'error', 'success');

            if (!email) {
                messageEl.textContent = 'Please enter your email';
                messageEl.classList.add('show', 'error');
                return;
            }

            btn.disabled = true;
            btn.classList.add('loading');

            try {
                const response = await fetch('/api/auth/forgot-password', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email })
                });

                const data = await response.json();

                if (response.ok) {
                    state.resetToken = data.token;
                    messageEl.textContent = 'Reset token sent! Copy it below and paste in the reset form.';
                    messageEl.classList.add('show', 'success');

                    document.getElementById('resetTokenBlock').textContent = data.token;
                    document.getElementById('resetTokenBlock').classList.add('show');
                    document.getElementById('resetForm').style.display = 'block';
                    document.getElementById('forgotForm').style.display = 'none';
                    document.getElementById('resetForm').scrollIntoView({ behavior: 'smooth', block: 'nearest' });
                } else {
                    throw new Error(data.message || 'Failed to send reset token');
                }
            } catch (error) {
                messageEl.textContent = error.message;
                messageEl.classList.add('show', 'error');
            } finally {
                btn.disabled = false;
                btn.classList.remove('loading');
            }
        }

        async function handleResetPassword() {
            const token = document.getElementById('resetToken').value;
            const password = document.getElementById('resetPassword').value;
            const confirmPassword = document.getElementById('resetConfirmPassword').value;
            const messageEl = document.getElementById('resetMessage');
            const btn = document.getElementById('confirmResetBtn');

            messageEl.classList.remove('show', 'error', 'success');

            if (password !== confirmPassword) {
                messageEl.textContent = 'Passwords do not match';
                messageEl.classList.add('show', 'error');
                return;
            }

            const requirements = validatePasswordRequirements(password);
            if (!requirements.length || !requirements.special || !requirements.number) {
                messageEl.textContent = 'Password does not meet requirements';
                messageEl.classList.add('show', 'error');
                return;
            }

            btn.disabled = true;
            btn.classList.add('loading');

            try {
                const response = await fetch('/api/auth/reset-password', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ token, password })
                });

                const data = await response.json();

                if (response.ok) {
                    messageEl.textContent = 'Password reset successful! Returning to login...';
                    messageEl.classList.add('show', 'success');
                    setTimeout(() => {
                        resetForgotPasswordView();
                        switchView('login');
                    }, 1500);
                } else {
                    throw new Error(data.message || 'Password reset failed');
                }
            } catch (error) {
                messageEl.textContent = error.message;
                messageEl.classList.add('show', 'error');
            } finally {
                btn.disabled = false;
                btn.classList.remove('loading');
            }
        }

        function resetForgotPasswordView() {
            document.getElementById('forgotForm').style.display = 'block';
            document.getElementById('resetForm').style.display = 'none';
            document.getElementById('resetTokenBlock').classList.remove('show');
            document.getElementById('forgotEmail').value = '';
            document.getElementById('resetToken').value = '';
            document.getElementById('resetPassword').value = '';
            document.getElementById('resetConfirmPassword').value = '';
            document.getElementById('forgotMessage').classList.remove('show');
            document.getElementById('resetMessage').classList.remove('show');
            state.resetToken = null;
        }

        // Hash-based routing
        function handleRouting() {
            const hash = window.location.hash.slice(1) || 'login';
            if (hash === 'login' || hash === 'signup' || hash === 'forgot-password') {
                switchView(hash);
            }
        }

        window.addEventListener('hashchange', handleRouting);
        handleRouting();
    </script>
</body>
</html>
